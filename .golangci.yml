version: "2"

run:
  timeout: 5m
  go: "1.25"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

  settings:
    errcheck:
      check-blank: false
    staticcheck:
      checks: ["all", "-SA1019"]

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
