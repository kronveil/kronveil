apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kronveil.fullname" . }}-agent
  labels:
    {{- include "kronveil.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kronveil.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
      labels:
        {{- include "kronveil.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: {{ include "kronveil.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.restPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.api.grpcPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.integrations.prometheus.port }}
              protocol: TCP
          env:
            - name: KRONVEIL_LOG_LEVEL
              value: {{ .Values.agent.logLevel }}
            - name: KRONVEIL_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers }}
            - name: KRONVEIL_BEDROCK_REGION
              value: {{ .Values.bedrock.region }}
            - name: KRONVEIL_BEDROCK_MODEL_ID
              value: {{ .Values.bedrock.modelId }}
            - name: KRONVEIL_API_REST_PORT
              value: {{ .Values.api.restPort | quote }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
