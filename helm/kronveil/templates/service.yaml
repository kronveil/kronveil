apiVersion: v1
kind: Service
metadata:
  name: {{ include "kronveil.fullname" . }}
  labels:
    {{- include "kronveil.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.api.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.integrations.prometheus.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "kronveil.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: agent
---
{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kronveil.fullname" . }}-dashboard
  labels:
    {{- include "kronveil.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "kronveil.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
{{- end }}
