replicaCount: 1

image:
  repository: kronveil/agent
  pullPolicy: Always
  tag: "0.1.0"

imagePullSecrets: []
  # - name: regcred  # Required for private registries
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automountServiceAccountToken: true  # Required for K8s API access
  annotations: {}
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/kronveil
    # iam.gke.io/gcp-service-account: kronveil@project.iam.gserviceaccount.com
  name: ""

rbac:
  create: true

agent:
  logLevel: info
  logFormat: json

bedrock:
  region: us-east-1
  modelId: "anthropic.claude-3-sonnet-20240229-v1:0"
  maxTokens: 2048
  temperature: 0.3
  # Credentials should be provided via IAM roles (IRSA/Pod Identity), NOT values:
  # credentialsSecret:
  #   name: bedrock-credentials
  #   key: aws-access-key

kafka:
  bootstrapServers: "kafka:9092"
  groupId: "kronveil-agent"

collectors:
  kubernetes:
    enabled: true
    namespaces: []
    pollInterval: 30s
  kafka:
    enabled: false
    bootstrapServers: ""
    monitoredTopics: []
    consumerGroups: []
    lagThreshold: 10000
  cloud:
    enabled: false
    provider: aws
    regions: []
  cicd:
    enabled: false
  logs:
    enabled: false

intelligence:
  anomalyDetection:
    sensitivity: medium
    windowSize: 300
    zscoreThreshold: 3.0
  remediation:
    autoRemediate: false  # Safe default: require explicit opt-in
    dryRun: true          # Safe default: dry-run mode until operator confirms
    maxRetries: 3

integrations:
  vault:
    enabled: false
    address: ""
    authMethod: kubernetes
  slack:
    enabled: false
    # Bot token must be provided via Kubernetes Secret, never in values:
    # kubectl create secret generic slack-credentials --from-literal=botToken=xoxb-...
    credentialsSecret:
      name: slack-credentials
      key: botToken
    defaultChannel: "#kronveil-alerts"
  pagerduty:
    enabled: false
    # Routing key must be provided via Kubernetes Secret, never in values:
    # kubectl create secret generic pagerduty-credentials --from-literal=routingKey=...
    credentialsSecret:
      name: pagerduty-credentials
      key: routingKey
  prometheus:
    enabled: true
    port: 9090

api:
  restPort: 8080
  grpcPort: 9091

dashboard:
  enabled: true
  replicaCount: 1
  image:
    repository: kronveil/dashboard
    pullPolicy: Always
    tag: "0.1.0"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: kronveil.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

networkPolicy:
  enabled: true
