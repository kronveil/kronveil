name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.4.0
        with:
          go-version: "1.25"
          check-latest: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: "v2.11.3"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.4.0
        with:
          go-version: "1.25"
          check-latest: true
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "::warning::govulncheck found vulnerabilities (see above)"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.4.0
        with:
          go-version: "1.25"
          check-latest: true
      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out
      - name: Check coverage threshold
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${coverage}%"
          threshold=40
          if [ "$(echo "$coverage < $threshold" | bc -l)" -eq 1 ]; then
            echo "Coverage ${coverage}% is below ${threshold}% threshold"
            exit 1
          fi
      - name: Upload coverage
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.4.0
        with:
          go-version: "1.25"
          check-latest: true
      - name: Build agent
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w \
            -X github.com/kronveil/kronveil/internal/version.Version=${{ github.ref_name }} \
            -X github.com/kronveil/kronveil/internal/version.GitCommit=${{ github.sha }}" \
            -o kronveil ./cmd/kronveil

  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-buildx-action@v3.10.0
      - name: Build image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: deploy/Dockerfile.agent
          push: false
          load: true
          tags: kronveil/agent:latest
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: kronveil/agent:latest
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: dashboard
        run: npm ci
      - name: Lint
        working-directory: dashboard
        run: npm run lint
      - name: Build
        working-directory: dashboard
        run: npm run build

  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: azure/setup-helm@v4.3.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint chart
        run: helm lint helm/kronveil/
